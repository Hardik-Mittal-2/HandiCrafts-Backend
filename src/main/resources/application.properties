server.port=${PORT:8080}

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/handicrafts}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:default-secret-key}
jwt.expiration-ms=86400000

# ===============================
# Mail Configuration (SAFE DEFAULT)
# ===============================
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

# ===============================
# Google OAuth (SAFE DEFAULT)
# ===============================
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:dummy}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:dummy}
google.oauth.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html

# ===============================
# CORS Configuration
# ===============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ===============================
# Application Info
# ===============================
app.name=Tribal Handicrafts Platform
app.version=1.0.0

# ===============================
# Logging Configuration
# ===============================
spring.main.banner-mode=off
logging.pattern.console=%d{HH:mm:ss} - %msg%n

logging.level.root=WARN
logging.level.com.backend.handicrafts=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

# Optional Debug
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ===============================
# API Base Path
# ===============================
server.servlet.context-path=/api

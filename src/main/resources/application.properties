server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/handicrafts
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-prod}
jwt.expiration-ms=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
google.oauth.redirect-uri=http://localhost:8080/login/oauth2/code/google

spring.main.banner-mode=off
logging.pattern.console=%d{HH:mm:ss} - %msg%n
logging.level.root=WARN
logging.level.com.backend.handicrafts=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

# Swagger / OpenAPI
springdoc.api-docs.path=/api/v3/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
